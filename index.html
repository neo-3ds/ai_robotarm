<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 로봇집게 태블릿 제어기 (V1.7)</title>
    <!-- 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        
        /* 뷰포트 레이아웃 제어 */
        .canvas-container { 
            position: relative; 
            width: 100%; 
            height: 65vh; 
            background: #1e293b; 
            border-radius: 1rem; 
            overflow: hidden; 
            border: 1px solid #334155; 
            transition: all 0.3s ease;
        }
        
        /* 전체화면 모드 스타일 */
        .canvas-container.is-fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            border-radius: 0;
            border: none;
        }

        /* 투명 하단 UI */
        #ui-footer {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            z-index: 110;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
        }

        video { transform: rotateY(180deg); position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .touch-point { position: absolute; width: 45px; height: 45px; border: 2px solid rgba(34, 211, 238, 0.5); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); display: none; z-index: 50; background: rgba(34, 211, 238, 0.1); }
        
        /* 투명 버튼 스타일 */
        .btn-mode {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            font-weight: bold;
            font-size: 0.875rem;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-active { background: rgba(34, 211, 238, 0.2); border-color: rgba(34, 211, 238, 0.5); color: #22d3ee; }
        .btn-inactive { background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.4); }

        /* 확대 버튼 (왼쪽 상단 고정) */
        #expandBtn {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 120;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div id="ui-header" class="w-full max-w-2xl">
        <header class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-bold text-cyan-400">AI Robot Controller</h1>
                <p id="chipInfo" class="text-[10px] text-slate-400 font-mono">FTDI/CH34x v1.7</p>
            </div>
            <div class="flex items-center space-x-2">
                <span id="connStatus" class="text-xs text-gray-400"><span class="status-dot bg-red-500"></span>연결 끊김</span>
                <button id="connectBtn" class="bg-cyan-600 hover:bg-cyan-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-all active:scale-95">USB 연결</button>
            </div>
        </header>

        <div id="mainViewport" class="canvas-container shadow-2xl">
            <video id="inputVideo" playsinline></video>
            <canvas id="outputCanvas"></canvas>
            
            <button id="expandBtn">
                <svg id="expandIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 16 16">
                    <path d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1h-4zM10 .5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zM.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/>
                </svg>
            </button>

            <div id="touchPoint" class="touch-point"></div>
            <div id="touchOverlay" class="absolute inset-0 z-20 flex items-center justify-center pointer-events-none transition-opacity duration-500">
                <p id="modeText" class="bg-slate-900/60 backdrop-blur-md px-6 py-3 rounded-full text-sm font-bold text-cyan-200 border border-white/10 shadow-xl">USB 연결 후 모드를 선택하세요</p>
            </div>
        </div>

        <div id="ui-footer">
            <button id="modeGesture" class="btn-mode btn-active">동작 인식</button>
            <button id="modeTouch" class="btn-mode btn-inactive">화면 터치</button>
        </div>
    </div>

    <script>
        // --- 하드웨어 통신 및 상태 ---
        let device;
        let endpointOut = 0x02; 
        let currentMode = 'gesture';
        let isFullscreen = false;
        let angles = { ud: 90, lr: 90, gr: 90 };
        let sendTimer = null;
        let overlayTimer = null;

        const connectBtn = document.getElementById('connectBtn');
        const connStatus = document.getElementById('connStatus');
        const modeText = document.getElementById('modeText');
        const touchOverlay = document.getElementById('touchOverlay');
        const chipInfo = document.getElementById('chipInfo');
        const mainViewport = document.getElementById('mainViewport');
        const expandBtn = document.getElementById('expandBtn');
        const uiHeader = document.getElementById('ui-header');
        const uiFooter = document.getElementById('ui-footer');

        function showMessage(text, autoHide = true) {
            modeText.innerText = text;
            touchOverlay.style.opacity = "1";
            if (overlayTimer) clearTimeout(overlayTimer);
            if (autoHide) {
                overlayTimer = setTimeout(() => { touchOverlay.style.opacity = "0"; }, 2500);
            }
        }

        // 전체화면 토글
        expandBtn.onclick = (e) => {
            e.stopPropagation();
            isFullscreen = !isFullscreen;
            if (isFullscreen) {
                mainViewport.classList.add('is-fullscreen');
                uiHeader.querySelector('header').classList.add('hidden');
            } else {
                mainViewport.classList.remove('is-fullscreen');
                uiHeader.querySelector('header').classList.remove('hidden');
            }
            setTimeout(() => {
                canvasElement.width = mainViewport.offsetWidth;
                canvasElement.height = mainViewport.offsetHeight;
            }, 100);
        };

        // USB 연결
        connectBtn.addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }, { vendorId: 0x1a86 }, { vendorId: 0x2341 }] });
                await device.open();
                if (device.configuration === null) await device.selectConfiguration(1);
                await device.claimInterface(0);

                if (device.vendorId === 0x0403) {
                    chipInfo.innerText = "FTDI Connected";
                    await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x00, value: 0x00, index: 0x00 });
                    await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x03, value: 0x001a, index: 0x0000 });
                } else if (device.vendorId === 0x1a86) {
                    chipInfo.innerText = "CH34x Connected";
                    await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0xa1, value: 0xc29c, index: 0xb200 });
                    await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x9a, value: 0x2518, index: 0x0033 });
                }

                connStatus.innerHTML = '<span class="status-dot bg-green-500"></span>연결됨';
                connectBtn.style.display = 'none';
                showMessage("조종 준비 완료!");
                
                if (sendTimer) clearInterval(sendTimer);
                // 전송 속도 상향 (30ms)
                sendTimer = setInterval(sendPacket, 30); 
            } catch (err) {
                console.error(err);
                showMessage("연결 실패", false);
            }
        });

        async function sendPacket() {
            if (!device || !device.opened) return;
            const packet = new Uint8Array([0xFF, 0x55, 0x01, angles.ud, angles.lr, angles.gr, 0x02, 0, 0, 0, 0, 0]);
            try { await device.transferOut(endpointOut, packet); } 
            catch (e) { try { await device.transferOut(0x01, packet); } catch(e2) {} }
        }

        // --- MediaPipe Hands ---
        const videoElement = document.getElementById('inputVideo');
        const canvasElement = document.getElementById('outputCanvas');
        const canvasCtx = canvasElement.getContext('2d');

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75, minTrackingConfidence: 0.75 });
        hands.onResults(onResults);

        // 조종 범위를 크게 수정 (0.2~0.8 범위를 0~180도로 매핑하여 끝부분 도달 용이)
        function mapAngle(val) {
            let result = (val - 0.2) / 0.6 * 180;
            return Math.max(0, Math.min(180, Math.round(result)));
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                if (currentMode === 'gesture') {
                    const wrist = landmarks[0];
                    const thumb = landmarks[4];
                    const index = landmarks[8];
                    
                  
                    angles.lr = mapAngle(wrist.x);
                    // 상하(UD) 범위 확대
                    angles.ud = mapAngle(wrist.y);

                    // 그리퍼 민감도 상향
                    const dist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
                    if (dist < 0.07) angles.gr = 180;
                    else if (dist > 0.12) angles.gr = 0;
                    else angles.gr = 90;
                }
                
                // 관절 좌표 표시 수정: 반대 방향으로 움직이는 문제 해결 (landmark.x 사용)
                for (const landmark of landmarks) {
                    canvasCtx.beginPath();
                    // 미러링된 영상과 일치하도록 좌표 매핑
                    canvasCtx.arc(landmark.x * canvasElement.width, landmark.y * canvasElement.height, 5, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = "#22d3ee";
                    canvasCtx.fill();
                    canvasCtx.strokeStyle = "white";
                    canvasCtx.lineWidth = 1;
                    canvasCtx.stroke();
                }
            }
            canvasCtx.restore();
        }

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();

        // --- 터치 제어 ---
        const touchPoint = document.getElementById('touchPoint');
        mainViewport.addEventListener('touchstart', handleTouch);
        mainViewport.addEventListener('touchmove', handleTouch);
        mainViewport.addEventListener('touchend', () => { touchPoint.style.display = 'none'; });

        function handleTouch(e) {
            if (currentMode !== 'touch') return;
            if (e.target.closest('#expandBtn')) return;

            e.preventDefault();
            const rect = mainViewport.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) / rect.width;
            const y = (touch.clientY - rect.top) / rect.height;

            touchPoint.style.display = 'block';
            touchPoint.style.left = (touch.clientX - rect.left) + 'px';
            touchPoint.style.top = (touch.clientY - rect.top) + 'px';

            if (x > 0.8) {
                // 우측 그리퍼 조종 범위 확대
                angles.gr = mapAngle(y);
            } else {
                // 관절 조종 범위 확대 (터치는 직관을 위해 1-x 사용)
                angles.lr = mapAngle(1 - x);
                angles.ud = mapAngle(y);
            }
        }

        const btnGesture = document.getElementById('modeGesture');
        const btnTouch = document.getElementById('modeTouch');

        btnGesture.onclick = () => {
            currentMode = 'gesture';
            btnGesture.className = "btn-mode btn-active";
            btnTouch.className = "btn-mode btn-inactive";
            showMessage("동작 인식 모드");
        };

        btnTouch.onclick = () => {
            currentMode = 'touch';
            btnTouch.className = "btn-mode btn-active";
            btnGesture.className = "btn-mode btn-inactive";
            showMessage("화면 터치 모드");
        };

        window.addEventListener('resize', () => {
            canvasElement.width = mainViewport.offsetWidth;
            canvasElement.height = mainViewport.offsetHeight;
        });
        window.dispatchEvent(new Event('resize'));
    </script>
</body>
</html>
