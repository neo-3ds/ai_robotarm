<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Robot Controller V2.5</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        
        .canvas-container { 
            position: relative; width: 100%; height: 65vh; background: #1e293b; border-radius: 1.5rem; 
            overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        .canvas-container.is-fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 50; border-radius: 0; }

        #ui-footer {
            position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%); width: 85%; max-width: 450px;
            z-index: 100; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            padding: 10px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; gap: 10px;
        }

        video { transform: rotateY(180deg); position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        
        .btn-mode { flex: 1; padding: 16px; border-radius: 18px; font-weight: 800; font-size: 0.9rem; transition: all 0.2s; border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-active { background: rgba(34, 211, 238, 0.3); border-color: rgba(34, 211, 238, 0.6); color: #22d3ee; box-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }
        .btn-inactive { background: rgba(255, 255, 255, 0.02); color: rgba(255, 255, 255, 0.3); }

        /* 팝업 스타일 */
        #guideModal {
            position: fixed; inset: 0; z-index: 2000; display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #1e293b; width: 90%; max-width: 450px; border-radius: 2rem; padding: 2rem;
            border: 1px solid rgba(34, 211, 238, 0.3); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div id="guideModal">
        <div class="modal-content">
            <h2 class="text-xl font-black text-cyan-400 mb-4 border-b border-cyan-900 pb-2">📦 연결 방법 가이드</h2>
            <ul class="text-sm space-y-3 text-slate-200 leading-relaxed">
                <li class="flex gap-2"><span>1.</span><span>모바일 기기는 반드시 <strong>인터넷에 연결</strong> 되어 있어야 합니다.</span></li>
                <li class="flex gap-2 text-cyan-300 font-bold"><span>2.</span><span><strong>크롬 브라우저</strong>에서만 동작합니다.</span></li>
                <li class="flex gap-2"><span>3.</span><span>로봇의 전원을 끈 후 데이터 케이블로 기기와 로봇을 연결합니다.</span></li>
                <li class="flex gap-2"><span>4.</span><span>'USB연결' 버튼을 누른 후 화면 바깥 빈 곳을 터치하면 <strong>'FT232R USB UART'</strong> 목록이 나타납니다.</span></li>
                <li class="flex gap-2"><span>5.</span><span>목록을 선택하면 로봇이 연결됩니다.</span></li>
                <li class="flex gap-2"><span>6.</span><span>로봇의 <strong>전원을 켜 주세요.</strong></span></li>
                <li class="flex gap-2 italic"><span>7.</span><span>'동작인식'과 '화면터치' 모드를 선택하여 조종해 보세요.</span></li>
            </ul>
            <button onclick="closeModal()" class="w-full mt-6 bg-cyan-600 hover:bg-cyan-500 py-4 rounded-xl font-black text-white shadow-lg active:scale-95 transition-all">가이드 닫기</button>
        </div>
    </div>

    <div id="ui-header" class="w-full max-w-2xl" style="position: relative; z-index: 400;">
        <header class="flex justify-between items-center mb-6 px-2 gap-2">
            <div class="flex-shrink-0">
                <h1 class="text-xl font-black text-cyan-400 tracking-tight">AI ROBOT</h1>
            </div>
            
            <button onclick="openInChrome()" class="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-xl py-2 px-3 text-[10px] font-bold flex items-center justify-center gap-2 transition-all">
                <img src="https://www.google.com/chrome/static/images/chrome-logo.svg" class="w-4 h-4">
                Chrome으로 열기
            </button>

            <div class="flex-shrink-0">
                <button id="connectBtn" class="bg-cyan-600 hover:bg-cyan-500 px-5 py-3 rounded-2xl text-xs font-black shadow-2xl transition-all active:scale-90">USB 연결</button>
            </div>
        </header>

        <div id="viewportContainer" class="canvas-container shadow-2xl">
            <video id="inputVideo" playsinline></video>
            <canvas id="outputCanvas"></canvas>
            
            <button id="expandBtn" style="position: absolute; top: 1.5rem; left: 1.5rem; z-index: 150; background: rgba(0, 0, 0, 0.5); padding: 12px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px);">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 16 16"><path d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1h-4zM10 .5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zM.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/></svg>
            </button>
            
            <div id="touchPoint" style="position: absolute; width: 50px; height: 50px; border: 2px solid rgba(34, 211, 238, 0.5); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); display: none; z-index: 80; background: rgba(34, 211, 238, 0.1);"></div>
            <div id="touchOverlay" class="absolute inset-0 z-20 flex items-center justify-center pointer-events-none transition-opacity duration-500">
                <p id="modeText" class="bg-slate-900/70 backdrop-blur-md px-8 py-4 rounded-full text-sm font-bold text-cyan-200 border border-white/10 shadow-2xl text-center">USB 연결을 시도해 주세요</p>
            </div>
        </div>

        <div id="ui-footer">
            <button id="modeGesture" class="btn-mode btn-active">동작 인식</button>
            <button id="modeTouch" class="btn-mode btn-inactive">화면 터치</button>
        </div>
    </div>

    <script>
        let device, serialPort, writer, currentMode = 'gesture', isFullscreen = false, angles = { ud: 90, lr: 90, gr: 90 }, sendTimer = null;

        // 팝업 관리 로직
        function closeModal() { document.getElementById('guideModal').style.display = 'none'; }
        
        // 크롬 강제 실행 시도 (안드로이드용 Intent)
        function openInChrome() {
            const currentUrl = window.location.href.replace(/^https?:\/\//, '');
            window.location.href = `intent://${currentUrl}#Intent;scheme=https;package=com.android.chrome;end`;
        }

        const connectBtn = document.getElementById('connectBtn');
        const viewportContainer = document.getElementById('viewportContainer');
        const canvasElement = document.getElementById('outputCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const videoElement = document.getElementById('inputVideo');

        function showMessage(text) {
            document.getElementById('modeText').innerText = text;
            document.getElementById('touchOverlay').style.opacity = "1";
            setTimeout(() => { document.getElementById('touchOverlay').style.opacity = "0"; }, 2000);
        }

        document.getElementById('expandBtn').onclick = (e) => {
            e.stopPropagation();
            isFullscreen = !isFullscreen;
            if (isFullscreen) viewportContainer.classList.add('is-fullscreen');
            else viewportContainer.classList.remove('is-fullscreen');
            setTimeout(resizeCanvas, 100);
        };

        connectBtn.onclick = async () => {
            try { if(camera) await camera.stop(); } catch(e){}
            viewportContainer.style.opacity = "0.1"; 

            try {
                if ("serial" in navigator) {
                    serialPort = await navigator.serial.requestPort();
                    await serialPort.open({ baudRate: 115200 });
                    writer = serialPort.writable.getWriter();
                    onConnectSuccess("Serial");
                } else if ("usb" in navigator) {
                    device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x0403 }, { vendorId: 0x1a86 }] });
                    await device.open();
                    if (device.configuration === null) await device.selectConfiguration(1);
                    await device.claimInterface(0);
                    onConnectSuccess("USB");
                }
            } catch (err) {
                console.error(err);
            } finally {
                viewportContainer.style.opacity = "1";
                try { if(camera) await camera.start(); } catch(e){}
            }
        };

        function onConnectSuccess(method) {
            connectBtn.style.display = 'none';
            showMessage("로봇 연결 성공!");
            if (sendTimer) clearInterval(sendTimer);
            sendTimer = setInterval(sendPacket, 30);
        }

        async function sendPacket() {
            if (!writer && (!device || !device.opened)) return;
            const packet = new Uint8Array([0xFF, 0x55, 0x01, angles.ud, angles.lr, angles.gr, 0x02, 0, 0, 0, 0, 0]);
            if (writer) await writer.write(packet).catch(() => {});
            else try { await device.transferOut(0x02, packet); } catch(e) { try { await device.transferOut(0x01, packet); } catch(e2) {} }
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        function mapAngle(val) {
            let result = (val - 0.22) / 0.56 * 180;
            return Math.max(0, Math.min(180, Math.round(result)));
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                if (currentMode === 'gesture') {
                    angles.lr = mapAngle(landmarks[0].x);
                    angles.ud = mapAngle(landmarks[0].y);
                    const dist = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);
                    angles.gr = dist < 0.075 ? 180 : (dist > 0.125 ? 0 : 90);
                }
                for (const landmark of landmarks) {
                    canvasCtx.beginPath();
                    canvasCtx.arc((1 - landmark.x) * canvasElement.width, landmark.y * canvasElement.height, 5, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = "#22d3ee";
                    canvasCtx.fill();
                }
            }
            canvasCtx.restore();
        }

        const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 });
        camera.start();

        viewportContainer.addEventListener('touchstart', (e) => {
            if (currentMode !== 'touch' || e.target.closest('#expandBtn')) return;
            e.preventDefault();
            handleTouch(e.touches[0]);
        });
        viewportContainer.addEventListener('touchmove', (e) => {
            if (currentMode !== 'touch' || e.target.closest('#expandBtn')) return;
            handleTouch(e.touches[0]);
        });

        function handleTouch(t) {
            const rect = viewportContainer.getBoundingClientRect();
            const x = (t.clientX - rect.left) / rect.width;
            const y = (t.clientY - rect.top) / rect.height;
            document.getElementById('touchPoint').style.display = 'block';
            document.getElementById('touchPoint').style.left = (t.clientX - rect.left) + 'px';
            document.getElementById('touchPoint').style.top = (t.clientY - rect.top) + 'px';
            if (x > 0.8) angles.gr = mapAngle(y);
            else { angles.lr = mapAngle(1 - x); angles.ud = mapAngle(y); }
        }

        document.getElementById('modeGesture').onclick = () => {
            currentMode = 'gesture';
            document.getElementById('modeGesture').className = "btn-mode btn-active";
            document.getElementById('modeTouch').className = "btn-mode btn-inactive";
        };
        document.getElementById('modeTouch').onclick = () => {
            currentMode = 'touch';
            document.getElementById('modeTouch').className = "btn-mode btn-active";
            document.getElementById('modeGesture').className = "btn-mode btn-inactive";
        };

        function resizeCanvas() {
            canvasElement.width = viewportContainer.offsetWidth;
            canvasElement.height = viewportContainer.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
