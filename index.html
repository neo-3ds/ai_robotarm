<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 로봇집게 태블릿 제어기 (드라이버 프리)</title>
    <!-- 라이브러리 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
        .canvas-container { position: relative; width: 100%; height: 50vh; background: #1e293b; border-radius: 1rem; overflow: hidden; }
        video { transform: rotateY(180deg); position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        /* 터치 피드백 시각화 */
        .touch-point { position: absolute; width: 40px; height: 40px; border: 2px solid #22d3ee; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); display: none; z-index: 50; background: rgba(34, 211, 238, 0.2); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <div class="w-full max-w-2xl">
        <header class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-bold text-cyan-400">AI Robot Controller</h1>
                <p class="text-[10px] text-slate-400">GitHub Pages Deployment Ready</p>
            </div>
            <div class="flex items-center space-x-2">
                <span id="connStatus" class="text-sm text-gray-400"><span class="status-dot bg-red-500"></span>연결 끊김</span>
                <button id="connectBtn" class="bg-cyan-600 hover:bg-cyan-500 px-4 py-2 rounded-lg text-sm font-bold shadow-lg transition-all active:scale-95">USB 연결</button>
            </div>
        </header>

        <div id="mainViewport" class="canvas-container shadow-2xl border border-slate-700 mb-6">
            <video id="inputVideo" playsinline></video>
            <canvas id="outputCanvas"></canvas>
            <div id="touchPoint" class="touch-point"></div>
            <div id="touchOverlay" class="absolute inset-0 z-20 flex items-center justify-center text-slate-500 pointer-events-none">
                <p id="modeText" class="bg-slate-900/50 px-4 py-2 rounded-full text-sm">USB를 연결하고 모드를 선택하세요</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 w-full">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <label class="text-xs text-slate-400 block mb-2 font-bold uppercase tracking-wider">제어 모드</label>
                <div class="flex space-x-2">
                    <button id="modeGesture" class="flex-1 py-3 rounded-lg bg-cyan-900 border border-cyan-500 text-cyan-100 font-bold transition-all active:scale-95">손동작 인식</button>
                    <button id="modeTouch" class="flex-1 py-3 rounded-lg bg-slate-700 border border-slate-600 text-slate-400 font-bold transition-all active:scale-95">화면 터치</button>
                </div>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <label class="text-xs text-slate-400 block mb-2 font-bold uppercase tracking-wider">실시간 관절 각도</label>
                <div class="grid grid-cols-3 gap-1 text-center font-mono">
                    <div class="bg-slate-900 rounded p-1"><div class="text-[8px] text-slate-500">상하</div><div id="valUD" class="text-cyan-400 text-lg">90</div></div>
                    <div class="bg-slate-900 rounded p-1"><div class="text-[8px] text-slate-500">좌우</div><div id="valLR" class="text-cyan-400 text-lg">90</div></div>
                    <div class="bg-slate-900 rounded p-1"><div class="text-[8px] text-slate-500">집게</div><div id="valGR" class="text-cyan-400 text-lg">90</div></div>
                </div>
            </div>
        </div>

        <div class="mt-6 p-4 bg-slate-900/50 rounded-lg text-xs text-slate-500 leading-relaxed">
            <ul class="list-disc list-inside">
                <li>안드로이드 크롬(Chrome) 브라우저 사용을 권장합니다.</li>
                <li>OTG 젠더를 사용하여 아두이노 나노와 태블릿을 연결하세요.</li>
                <li>화면 터치 모드에서 오른쪽 끝을 터치하면 집게를 제어할 수 있습니다.</li>
            </ul>
        </div>
    </div>

    <script>
        // --- WebUSB CH340 드라이버 구현 ---
        let device;
        let endpointOut = 2; 
        let currentMode = 'gesture';
        let angles = { ud: 90, lr: 90, gr: 90 };
        let isSending = false;

        const connectBtn = document.getElementById('connectBtn');
        const connStatus = document.getElementById('connStatus');
        const valUD = document.getElementById('valUD');
        const valLR = document.getElementById('valLR');
        const valGR = document.getElementById('valGR');
        const modeText = document.getElementById('modeText');

        // USB 연결 이벤트
        connectBtn.addEventListener('click', async () => {
            try {
                device = await navigator.usb.requestDevice({ filters: [{ vendorId: 0x1a86 }, { vendorId: 0x2341 }] });
                await device.open();
                if (device.configuration === null) await device.selectConfiguration(1);
                await device.claimInterface(0);

                // CH340 초기화 루틴 (115200bps)
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x9a, value: 0x2518, index: 0x0033 });
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0x9a, value: 0x0504, index: 0x0018 });
                await device.controlTransferOut({ requestType: 'vendor', recipient: 'device', request: 0xa1, value: 0xc29c, index: 0x0000 });

                connStatus.innerHTML = '<span class="status-dot bg-green-500"></span>연결됨';
                connectBtn.classList.add('opacity-50', 'pointer-events-none');
                connectBtn.innerText = "연결 완료";
                
                if (!isSending) {
                    isSending = true;
                    setInterval(sendData, 50);
                }
                modeText.innerText = "제어 모드를 선택해 주세요";
            } catch (err) {
                console.error("WebUSB 오류:", err);
                modeText.innerText = "연결 실패: USB 상태를 확인하세요";
            }
        });

        async function sendData() {
            if (!device || !device.opened) return;
            const packet = new Uint8Array([
                0xFF, 0x55, 1, 
                angles.ud, angles.lr, angles.gr,
                2, 0, 0, 0, 0, 0
            ]);
            try {
                await device.transferOut(endpointOut, packet);
            } catch (e) {
                console.warn("전송 실패");
            }
        }

        // --- MediaPipe Hands 설정 ---
        const videoElement = document.getElementById('inputVideo');
        const canvasElement = document.getElementById('outputCanvas');
        const canvasCtx = canvasElement.getContext('2d');

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                if (currentMode === 'gesture') {
                    const wrist = landmarks[0];
                    const thumbTip = landmarks[4];
                    const indexTip = landmarks[8];
                    
                    // LR(좌우): 화면 가로축 매핑 (반전 고려)
                    angles.lr = Math.round(180 - (wrist.x * 180));
                    // UD(상하): 화면 세로축 매핑
                    angles.ud = Math.round(wrist.y * 180);
                    // GR(집게): 엄지와 검지 거리 측정
                    const dist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                    angles.gr = dist < 0.06 ? 180 : (dist > 0.15 ? 0 : 90);
                    
                    updateUI();
                }
                // 랜드마크 렌더링
                for (const landmark of landmarks) {
                    canvasCtx.beginPath();
                    canvasCtx.arc(landmark.x * canvasElement.width, landmark.y * canvasElement.height, 3, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = "#22d3ee";
                    canvasCtx.fill();
                }
            }
            canvasCtx.restore();
        }

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();

        // --- 터치 제어 및 인터랙션 ---
        const mainViewport = document.getElementById('mainViewport');
        const touchPoint = document.getElementById('touchPoint');

        mainViewport.addEventListener('touchstart', handleTouch);
        mainViewport.addEventListener('touchmove', handleTouch);
        mainViewport.addEventListener('touchend', () => { touchPoint.style.display = 'none'; });

        function handleTouch(e) {
            if (currentMode !== 'touch') return;
            e.preventDefault();
            const rect = mainViewport.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) / rect.width;
            const y = (touch.clientY - rect.top) / rect.height;

            // 터치 포인트 시각화
            touchPoint.style.display = 'block';
            touchPoint.style.left = (touch.clientX - rect.left) + 'px';
            touchPoint.style.top = (touch.clientY - rect.top) + 'px';

            // 각도 계산
            angles.lr = Math.round(180 - (x * 180));
            angles.ud = Math.round(y * 180);
            
            // 화면 우측 20% 영역은 집게 제어
            if (x > 0.8) {
                angles.gr = Math.round(y * 180);
            }
            updateUI();
        }

        // 모드 전환 UI 업데이트
        const btnGesture = document.getElementById('modeGesture');
        const btnTouch = document.getElementById('modeTouch');

        btnGesture.onclick = () => {
            currentMode = 'gesture';
            btnGesture.className = "flex-1 py-3 rounded-lg bg-cyan-900 border border-cyan-500 text-cyan-100 font-bold active:scale-95";
            btnTouch.className = "flex-1 py-3 rounded-lg bg-slate-700 border border-slate-600 text-slate-400 font-bold active:scale-95";
            modeText.innerText = "카메라에 손을 보여주세요";
        };

        btnTouch.onclick = () => {
            currentMode = 'touch';
            btnTouch.className = "flex-1 py-3 rounded-lg bg-cyan-900 border border-cyan-500 text-cyan-100 font-bold active:scale-95";
            btnGesture.className = "flex-1 py-3 rounded-lg bg-slate-700 border border-slate-600 text-slate-400 font-bold active:scale-95";
            modeText.innerText = "화면을 터치하여 관절을 조종하세요";
        };

        function updateUI() {
            valUD.innerText = angles.ud;
            valLR.innerText = angles.lr;
            valGR.innerText = angles.gr;
        }

        window.addEventListener('resize', () => {
            canvasElement.width = canvasElement.offsetWidth;
            canvasElement.height = canvasElement.offsetHeight;
        });
        window.dispatchEvent(new Event('resize'));
    </script>
</body>
</html>
