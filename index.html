<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Robot Controller FIX</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body { background:#111; color:white; text-align:center; }
video { width:100%; opacity:0.3; }
canvas { position:absolute; top:0; left:0; }
button { padding:15px; font-size:16px; margin:10px; }
</style>
</head>

<body>

<h2>AI Robot Controller</h2>
<button id="connectBtn">USB 연결</button>

<video id="inputVideo" autoplay playsinline></video>
<canvas id="outputCanvas"></canvas>

<script>
let serialPort, writer, device;
let angles = {ud:90, lr:90, gr:90};

const video = document.getElementById('inputVideo');
const canvas = document.getElementById('outputCanvas');
const ctx = canvas.getContext('2d');

////////////////////////////////////////////////////////////
// ⭐⭐⭐ 핵심 수정된 연결 코드
////////////////////////////////////////////////////////////
document.getElementById('connectBtn').onclick = async () => {

    let port = null;
    let selectedDevice = null;

    try {
        // 🔥 1. 가장 먼저 실행 (중요)
        if ("serial" in navigator) {
            try {
                port = await navigator.serial.requestPort();
            } catch(e){}
        }

        if (!port && "usb" in navigator) {
            try {
                selectedDevice = await navigator.usb.requestDevice({
                    filters: [
                        { vendorId: 0x0403 }, // FT232R
                        { vendorId: 0x1a86 },
                        { vendorId: 0x2341 },
                        { vendorId: 0x10c4 }
                    ]
                });
            } catch(e){}
        }

        // 🔥 2. 이후 작업
        try { if(camera) await camera.stop(); } catch(e){}

        if (port) {
            serialPort = port;
            await serialPort.open({ baudRate: 115200 });
            writer = serialPort.writable.getWriter();
            alert("Serial 연결 성공");
        }

        else if (selectedDevice) {
            device = selectedDevice;
            await device.open();
            if (device.configuration === null)
                await device.selectConfiguration(1);
            await device.claimInterface(0);

            alert("USB 연결 성공");
        }

        // 카메라 다시 시작
        try { if(camera) await camera.start(); } catch(e){}

        setInterval(sendData, 30);

    } catch(err) {
        console.error(err);
    }
};

////////////////////////////////////////////////////////////
// 데이터 전송
////////////////////////////////////////////////////////////
async function sendData() {
    const packet = new Uint8Array([0xFF,0x55,1,angles.ud,angles.lr,angles.gr,2,0,0,0,0,0]);

    if (writer) {
        await writer.write(packet).catch(()=>{});
    } else if (device) {
        try { await device.transferOut(2, packet); }
        catch { try { await device.transferOut(1, packet); } catch{} }
    }
}

////////////////////////////////////////////////////////////
// MediaPipe 손 인식
////////////////////////////////////////////////////////////
const hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:1,
    modelComplexity:0,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});

hands.onResults(results => {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(results.multiHandLandmarks){
        const lm = results.multiHandLandmarks[0];

        const wrist = lm[0];
        const thumb = lm[4];
        const index = lm[8];

        angles.lr = Math.round(wrist.x * 180);
        angles.ud = Math.round(wrist.y * 180);

        const dist = Math.hypot(
            thumb.x - index.x,
            thumb.y - index.y
        );

        if(dist < 0.07) angles.gr = 180;
        else if(dist > 0.12) angles.gr = 0;
        else angles.gr = 90;

        // 시각화
        for(const p of lm){
            ctx.beginPath();
            ctx.arc((1-p.x)*canvas.width, p.y*canvas.height,5,0,6.28);
            ctx.fillStyle="cyan";
            ctx.fill();
        }
    }
});

////////////////////////////////////////////////////////////
// 카메라
////////////////////////////////////////////////////////////
const camera = new Camera(video, {
    onFrame: async () => {
        await hands.send({image: video});
    },
    width:640,
    height:480
});

camera.start();

window.onresize = () => {
    canvas.width = video.offsetWidth;
    canvas.height = video.offsetHeight;
};
window.onresize();

</script>
</body>
</html>
